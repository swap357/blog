<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="Posts by Swapnil Patel." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>posts | autoscaler.sh</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>></text></svg>" />
    <link rel="stylesheet" href="/shared/reset.css?v=3" />
    <link rel="alternate" type="application/json" href="/writing/index.json" />
    <style>
      .writing-shell {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: clamp(1.2rem, 3vw, 2rem);
      }

      h1 {
        font-family: var(--mono);
        font-weight: 400;
        font-size: 1.3rem;
        color: var(--text);
        margin: 2rem 0 2.5rem;
        letter-spacing: -0.01em;
      }

      .post-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .post {
        padding: 1.6rem 0;
      }

      .post + .post {
        border-top: 1px solid var(--line);
      }

      .post h2 {
        font-family: var(--mono);
        font-weight: 400;
        font-size: 1.05rem;
        margin: 0 0 0.35rem;
        line-height: 1.4;
      }

      .post h2 a {
        color: var(--text);
        text-decoration: none;
      }

      .post h2 a:hover {
        color: var(--accent);
      }

      .post .meta {
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--muted);
        letter-spacing: 0.02em;
        margin: 0 0 0.5rem;
      }

      .post .summary {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main class="writing-shell">
      <nav data-nav-root aria-label="site navigation"></nav>
      <h1>posts</h1>
      <section class="post-list" role="list">

      </section>
    </main>

    <script src="/shared/nav.js"></script>
    <script>
      window.mountPortalNav("[data-nav-root]", "/writing/");
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "autoscaler.sh posts",
        "url": "https://autoscaler.sh/writing/"
      }
    </script>
  </body>
</html>
