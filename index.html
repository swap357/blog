<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>autoscaler.sh</title>
    <meta name="description" content="Swapnil Patel — compilers, distributed systems, sci-fi, retro games." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>></text></svg>" />
    <link rel="stylesheet" href="/shared/reset.css?v=3" />
    <link rel="alternate" type="application/json" href="/index.json" />
    <style>
      html, body { min-height: 100%; }

      .content {
        padding: 1.5rem 0 0 2.5rem;
      }

      .greeting {
        margin: 0 0 0.3rem;
        font-family: var(--mono);
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 400;
        color: var(--text);
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .cursor {
        margin-left: 0.05em;
        opacity: 0.3;
      }

      .output {
        font-family: var(--mono);
        font-size: 0.9rem;
        color: var(--text);
        line-height: 1.8;
        margin: 0.6rem 0 0.3rem;
      }

      .output .muted { color: var(--muted); }

      .output a {
        color: var(--text);
        text-decoration: none;
        border-bottom: 1px solid var(--line);
      }

      .output a:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .agent-nudge {
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--muted);
        letter-spacing: 0.02em;
        margin: 0 0 1.2rem;
        padding-bottom: 1.2rem;
        border-bottom: 1px solid var(--line);
      }

      .agent-nudge a {
        color: var(--muted);
        text-decoration: none;
        border-bottom: 1px solid var(--line);
      }

      .agent-nudge a:hover {
        color: var(--accent);
        border-color: var(--accent);
      }

      .links {
        list-style: none;
        padding: 0;
        margin: 0;
        font-family: var(--mono);
        font-size: 0.85rem;
        line-height: 2.2;
      }

      .links a {
        color: var(--text);
        text-decoration: none;
        border-bottom: 1px solid transparent;
      }

      .links a:hover {
        border-color: var(--text);
      }

      .links .label {
        color: var(--muted);
        font-size: 0.72rem;
        margin-right: 0.4em;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <main class="page-shell">
        <nav data-nav-root aria-label="site navigation"></nav>
        <div class="content">
          <p class="greeting">./autoscaler.sh<span class="cursor">&#9608;</span></p>
          <div class="output">
            <span class="muted">name:</span> swapnil patel
            <br><span class="muted">github:</span> <a href="https://github.com/swap357">swap357</a>
          </div>
          <p class="agent-nudge">ai agents &rarr; <a href="/.well-known/agent-manifest.json">agent-manifest.json</a></p>
          <ul class="links" id="links"></ul>
        </div>
      </main>
    </div>

    <script src="/shared/nav.js"></script>
    <script>window.mountPortalNav("[data-nav-root]", "/");</script>

    <script>
    (function () {
      fetch("/writing/index.json")
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var links = document.getElementById("links");
          links.innerHTML = data.posts.map(function (p) {
            return '<li><span class="label">posts/</span><a href="' + p.url + '">' + p.title + '</a></li>';
          }).join("");
        });
    })();
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "autoscaler.sh",
        "url": "https://autoscaler.sh/",
        "description": "Swapnil Patel's site."
      }
    </script>
  </body>
</html>
