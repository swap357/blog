baseURL = 'http://autoscaler.sh/'
languageCode = 'en-us'
title = 'AutoScaler'
theme = "devise"

relativeURLs = true
enableEmoji = true
googleAnalytics = ""
enableRobotsTXT = true
copyright = "The views and content expressed on this site are strictly my own and not affiliated with any other party. <br> &copy; 2024, Swapnil Patel"

# Main menu items
[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    title = "About"
    url = "/about/"
    weight = -90
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    title = "Posts"
    url = "/post/"
    weight = -100

# Configuration Features
[params]
  description = ""      # Your meta description of the site
  header_title = "Swapnil Patel"                 # Your header title
  header_subtitle = "Software engineer @ Intel | San Jose,CA" # Your header subtitle
  home_image = "/images/avatar.png"          # Path to header image starting from the static directory (optional)
  recent_posts = 5                           # Max amount of recent posts to show
  mainSections = ["posts", "post", "blog"]   # Main sections to include in recent posts
  [params.style]                             # CSS style overrides
    backgroundColor = "#f8f9fa"
    homeImageBorderColor = "#ffffff"
    fontFamilyBase = "Helvetica Neue"        # First-choice font
    fontColor = "#212529"
  [[params.social]]
    fa_icon = "fab fa-github fa-1x"          # Font Awesome icon class
    href = "https://github.com/swap357"      # Link to associate with icon (http://, https://, mailto:)
  [[params.social]]
    fa_icon = "fab fa-linkedin-in fa-1x"
    href = "https://linkedin.com/in/swap357"
  [[params.social]]
    fa_icon = "fab fa-twitter fa-1x"
    href = "https://x.com/swap357"